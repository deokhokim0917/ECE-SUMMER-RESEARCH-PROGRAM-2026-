<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECE Summer Research Camp 2026 - Appreciation Board</title>
    <style>
        :root {
            /* Warm, bright Utah/Bryce Canyon color palette */
            --utah-red: #CC0000;
            --canyon-orange: #E85D04;
            --sandstone: #FFBA08;
            --text-dark: #2B1A10;
            --panel-bg: rgba(255, 255, 255, 0.85); /* Frosted glass effect */
        }
        
        body { 
            /* Bryce Canyon CSS Sunset Landscape */
            background: 
                radial-gradient(circle at 50% 25%, #FFF0BA 0%, #FFE066 8%, transparent 10%),
                linear-gradient(to bottom, #87CEEB 0%, #FFB677 40%, #E85D04 75%, #8B261D 100%);
            background-attachment: fixed;
            
            color: var(--text-dark); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-size: 1.1rem;
        }
        
        #dashboard { 
            width: 95%; 
            max-width: 1400px; 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 30px; 
            border: 2px solid rgba(255, 255, 255, 0.5); 
            padding: 30px; 
            border-radius: 15px; 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); 
        }
        
        .panel { 
            border: 1px solid rgba(204, 0, 0, 0.2); 
            padding: 25px; 
            border-radius: 10px; 
            position: relative; 
            background: var(--panel-bg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        h2 { 
            text-align: center; 
            color: var(--utah-red); 
            font-size: 1.3rem; 
            margin-top: 0;
            border-bottom: 2px solid var(--canyon-orange);
            padding-bottom: 15px;
            letter-spacing: 1px;
            font-weight: 800;
        }
        
        /* Left Panel: Input Nodes */
        .node-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-top: 25px;
        }
        
        .btn-node { 
            background: white; 
            border: 2px solid var(--canyon-orange); 
            color: var(--text-dark); 
            padding: 15px 10px; 
            cursor: pointer; 
            transition: all 0.2s ease-in-out; 
            font-family: inherit; 
            font-size: 1rem; 
            border-radius: 8px;
            font-weight: 600;
        }
        
        .btn-node:hover, .btn-node.active { 
            background: var(--canyon-orange);
            color: white; 
            box-shadow: 0 4px 10px rgba(232, 93, 4, 0.3); 
            transform: translateY(-2px);
        }
        
        /* Center Panel: Main Display */
        .cpu-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            text-align: center; 
            background: rgba(255, 255, 255, 0.95);
        }

        .logo-img {
            width: 160px; /* Doubled the logo size */
            margin-top: 15px;
            margin-bottom: 25px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.15));
        }
        
        .cpu-chip { 
            width: 240px; 
            height: 200px; 
            border: 3px solid var(--utah-red); 
            background: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(204, 0, 0, 0.1); 
            position: relative; 
            margin: 10px 0 30px 0; 
        }
        
        .cpu-text { 
            color: var(--utah-red); 
            font-weight: 900; 
            font-size: 1.3rem; 
            line-height: 1.5;
        }
        
        /* Right Panel: Terminal/Paper Output */
        #terminal { 
            background: #FFF9F2; 
            color: var(--text-dark); 
            padding: 25px; 
            border-radius: 8px; 
            height: 360px; 
            overflow-y: auto; 
            border: 2px solid rgba(232, 93, 4, 0.3); 
            font-size: 1.05rem; 
            line-height: 1.8;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .blinking-cursor { 
            display: inline-block; 
            width: 10px; 
            height: 1.1em; 
            background-color: var(--utah-red); 
            animation: blink 1s step-end infinite; 
            vertical-align: bottom; 
            margin-left: 3px;
        }
        
        @keyframes blink { 50% { opacity: 0; } }

        @media (max-width: 1100px) {
            #dashboard { grid-template-columns: 1fr; }
            .cpu-container { order: -1; }
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <div class="panel">
            <h2>MESSAGES</h2>
            <p style="font-size: 0.9rem; color: #666; text-align: center; margin-top: 15px; font-weight: 600;">SELECT A STUDENT</p>
            <div class="node-grid" id="student-nodes">
                </div>
        </div>

        <div class="panel cpu-container">
            <h2>ECE SUMMER RESEARCH PROGRAM 2026</h2>
            <img src="Untitled design.png" alt="University of Utah Logo" class="logo-img">
            <div class="cpu-chip">
                <div class="cpu-text">Professor<br>Hanseop Kim<br><br><span style="color: var(--canyon-orange); font-size: 1rem; font-weight: 600;">University of Utah<br>Asia Campus</span></div>
            </div>
            <p style="color: var(--utah-red); font-size: 1rem; font-weight: bold;" id="status-text">Ready for messages...</p>
        </div>

        <div class="panel">
            <h2>APPRECIATION BOARD</h2>
            <div id="terminal">
                <span id="terminal-text" style="color: #666; font-style: italic;">Welcome.<br><br>Please select a student's name on the left to read their message for Professor Kim.</span><span class="blinking-cursor"></span>
            </div>
        </div>
    </div>

    <script>
        // --- DATA SECTION: PASTE THE MESSAGES HERE ---
        const messages = {
            1: { name: "Jongmin Lee", text: "Thank you so much for planning and organizing this incredible program for us! It was such an honor and privilege to visit the main campus and experience everything you put together. The tour of the Nanofab and the advanced research labs was truly amazing and deeply inspiring for all of us. Thank you for your vision, dedication, and for providing us with this invaluable opportunity to grow. We respect you so much!" },
            2: { name: "Sejin Lee", text: "Thank you for the ECE summer program you designed, exploring new labs and companies truly opened my mind. Going beyond the Asia Campus gave me so much to explore, and now my future research goals are clearer than before. I truly appreciate you giving me this great opportunity once more." },
            3: { name: "Deokho Kim", text: "Thank you so much for creating this program so we could experience life at the main campus before eventually making our move to SLC. This camp has led me to think much more deeply about my future and showed me so many exciting paths I can take within the ECE department. Seeing all these opportunities firsthand has really fueled my ambitions, and I am incredibly grateful for the direction and inspiration this experience has given me." },
            4: { name: "Jeongbin Lee", text: "Thank you for giving us the lab tours during the summer camp. Before the camp, I was not sure what major or job I wanted in the future. After the lab tours, I could think more about what I want to study. It was very helpful. If I have a chance like this again, I really want to join again. Thank you so much!" },
            5: { name: "Juram Lee", text: "Thank you for giving me the opportunity to participate in the ECE 2026 Summer Camp. I truly appreciate all the time and effort you put into organizing this program. It was a valuable experience, and I learned a lot throughout the camp. Thank you for your support and encouragement." },
            6: { name: "Junho Yun", text: "Thank you for offering us this opportunity. During the ECE summer camp I learned a lot and experienced so many things that I didn't know before. With such expereience I will make sure I contribute more to the ECE department! Thank you so much! I will see you soon!" },
            7: { name: "Woohyun Kang", text: "Thank you so much for organizing this amazing summer camp. I truly appreciate all the effort you have put into making this program possible. Meeting many professors and visiting their research labs was one of the most valuable parts of this experience. I also really appreciated how you helped us understand life in Utah and made us feel welcome. Thank you for giving us such a meaningful and unforgettable experience." },
            8: { name: "Eonjin Kim", text: "Thank you so much for your endless support and dedication during the Summer Camp! We were deeply moved by how you constantly made time to look after us, even with your incredibly busy schedule. It was so reassuring and empowering to have your strong guidance as our department chair, always encouraging us to take on new opportunities and grow. Thanks to your warm mentorship and care, I feel immense pride as an ECE student and have learned so much. I will continue to work hard to repay your kindness. Wishing you continuous health and happiness!" },
            9: { name: "Student 9", text: "Paste Student 9's message here!" },
        };

        const nodeGrid = document.getElementById('student-nodes');
        const terminalText = document.getElementById('terminal-text');
        const statusText = document.getElementById('status-text');
        let isTyping = false;

        // Generate the 9 buttons
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn-node';
            btn.innerText = messages[i].name;
            btn.onclick = () => processSignal(i, btn);
            nodeGrid.appendChild(btn);
        }

        function processSignal(id, btn) {
            if (isTyping) return;
            isTyping = true;

            document.querySelectorAll('.btn-node').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            statusText.innerText = `Loading message from ${messages[id].name}...`;

            // Bright theme boot sequence
            const bootSequence = `<span style="color:var(--canyon-orange); font-weight:bold;">From:</span> <span style="color:var(--utah-red); font-weight:bold; font-size:1.2rem;">${messages[id].name}</span><br><br>`;
            
            terminalText.innerHTML = bootSequence;
            const actualMessage = messages[id].text;
            let i = 0;

            function typeWriter() {
                if (i < actualMessage.length) {
                    terminalText.innerHTML += actualMessage.charAt(i);
                    i++;
                    
                    const termDiv = document.getElementById('terminal');
                    termDiv.scrollTop = termDiv.scrollHeight;
                    
                    setTimeout(typeWriter, 20); 
                } else {
                    statusText.innerText = "Ready for messages...";
                    isTyping = false;
                }
            }
            
            setTimeout(typeWriter, 300); 
        }
    </script>
</body>
</html>
