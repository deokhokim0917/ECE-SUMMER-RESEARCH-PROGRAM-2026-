<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V_CHAIR Terminal - ECE Summer Research Camp</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --neon-gold: #ffba08;
            --bg-dark: #0a0a0f;
            --panel-bg: #11111a;
        }
        
        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        #dashboard { 
            width: 95%; 
            max-width: 1200px; 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 20px; 
            border: 2px solid var(--neon-blue); 
            padding: 20px; 
            border-radius: 10px; 
            background: var(--panel-bg); 
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.15); 
        }
        
        .panel { 
            border: 1px solid #333; 
            padding: 15px; 
            border-radius: 5px; 
            position: relative; 
            background: rgba(0, 0, 0, 0.4);
        }
        
        .panel::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 2px; 
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent); 
        }
        
        h2 { 
            text-align: center; 
            color: var(--neon-blue); 
            text-shadow: 0 0 5px var(--neon-blue); 
            font-size: 1.1rem; 
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        
        /* Left Panel: Input Nodes */
        .node-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-top: 20px;
        }
        
        .btn-node { 
            background: transparent; 
            border: 1px solid var(--neon-blue); 
            color: var(--neon-blue); 
            padding: 12px 5px; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-family: inherit; 
            font-size: 0.85rem;
            border-radius: 3px;
        }
        
        .btn-node:hover, .btn-node.active { 
            background: var(--neon-blue); 
            color: #000; 
            box-shadow: 0 0 15px var(--neon-blue); 
            font-weight: bold;
        }
        
        /* Center Panel: CPU / Chip Design */
        .cpu-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }
        
        .cpu-chip { 
            width: 160px; 
            height: 160px; 
            border: 4px solid var(--neon-gold); 
            background: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-radius: 8px; 
            box-shadow: 0 0 20px rgba(255, 186, 8, 0.3); 
            position: relative; 
            margin: 30px 0; 
        }
        
        .cpu-chip::after {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            border: 1px dashed var(--neon-gold);
            border-radius: 12px;
            opacity: 0.5;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        
        .cpu-text { 
            color: var(--neon-gold); 
            font-weight: bold; 
            font-size: 1rem; 
            text-shadow: 0 0 5px var(--neon-gold);
        }
        
        /* Right Panel: Terminal */
        #terminal { 
            background: #050505; 
            color: var(--neon-green); 
            padding: 15px; 
            border-radius: 5px; 
            height: 300px; 
            overflow-y: auto; 
            border: 1px solid #222; 
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .blinking-cursor { 
            display: inline-block; 
            width: 8px; 
            height: 1.1em; 
            background-color: var(--neon-green); 
            animation: blink 1s step-end infinite; 
            vertical-align: bottom; 
            margin-left: 2px;
        }
        
        @keyframes blink { 50% { opacity: 0; } }

        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            #dashboard { grid-template-columns: 1fr; }
            .cpu-container { order: -1; } /* Puts the chip at the top on phones */
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <!-- Left Panel: Input Nodes -->
        <div class="panel">
            <h2>> SIGNAL_INPUTS</h2>
            <p style="font-size: 0.75rem; color: #888; text-align: center;">SELECT A NODE TO TRANSMIT DATA</p>
            <div class="node-grid" id="student-nodes">
                <!-- Buttons are injected here by JavaScript -->
            </div>
        </div>

        <!-- Center Panel: Processor -->
        <div class="panel cpu-container">
            <h2>> VLSI_ROUTING_CENTER</h2>
            <div class="cpu-chip">
                <div class="cpu-text">PROF_KIM<br>[V_CHAIR]</div>
            </div>
            <p style="color: var(--neon-blue); font-size: 0.85rem;" id="status-text">Status: Awaiting KCL node analysis...</p>
        </div>

        <!-- Right Panel: Terminal Output -->
        <div class="panel">
            <h2>> COMPILED_OUTPUT</h2>
            <div id="terminal">
                <span id="terminal-text">> System Initialized.<br>> Awaiting input signal to compile appreciation metric...</span><span class="blinking-cursor"></span>
            </div>
        </div>
    </div>

    <script>
        // --- DATA SECTION: PASTE THE MESSAGES HERE ---
        // Keep the quotation marks around the names and messages!
        const messages = {
            1: { name: "Student 1", text: "Paste Student 1's message here!" },
            2: { name: "Student 2", text: "Paste Student 2's message here!" },
            3: { name: "Deokho", text: "Thank you so much for creating this program so we could experience life at the main campus before eventually making our move to SLC. This camp has led me to think much more deeply about my future and showed me so many exciting paths I can take within the ECE department. Seeing all these opportunities firsthand has really fueled my ambitions, and I am incredibly grateful for the direction and inspiration this experience has given me." },
            4: { name: "Student 4", text: "Paste Student 4's message here!" },
            5: { name: "Student 5", text: "Paste Student 5's message here!" },
            6: { name: "Student 6", text: "Paste Student 6's message here!" },
            7: { name: "Student 7", text: "Paste Student 7's message here!" },
            8: { name: "Student 8", text: "Paste Student 8's message here!" },
            9: { name: "Student 9", text: "Paste Student 9's message here!" },
        };

        const nodeGrid = document.getElementById('student-nodes');
        const terminalText = document.getElementById('terminal-text');
        const statusText = document.getElementById('status-text');
        let isTyping = false;

        // Generate the 9 buttons
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn-node';
            btn.innerText = `NODE_${i} [${messages[i].name}]`;
            btn.onclick = () => processSignal(i, btn);
            nodeGrid.appendChild(btn);
        }

        // Logic for typing the message
        function processSignal(id, btn) {
            if (isTyping) return; // Prevent clicking while another message is typing
            isTyping = true;

            // Highlight the clicked button
            document.querySelectorAll('.btn-node').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            statusText.innerText = `Status: Processing signal from ${messages[id].name}...`;

            // Cool boot sequence text
            const bootSequence = `> Executing KCL analysis at NODE_${id}... <br>> Connecting theoretical concepts to chip design module...<br>> Compiling societal impact algorithms...<br>> Accessing secure data from: <span style="color:white;">${messages[id].name}</span><br><br>> <span style="color:var(--neon-gold);">DECRYPTING MESSAGE:</span><br>`;
            
            terminalText.innerHTML = bootSequence;
            const actualMessage = messages[id].text;
            let i = 0;

            // Typewriter effect function
            function typeWriter() {
                if (i < actualMessage.length) {
                    terminalText.innerHTML += actualMessage.charAt(i);
                    i++;
                    
                    // Auto-scroll to bottom of terminal
                    const termDiv = document.getElementById('terminal');
                    termDiv.scrollTop = termDiv.scrollHeight;
                    
                    setTimeout(typeWriter, 25); // Speed of the typing effect (lower is faster)
                } else {
                    terminalText.innerHTML += '<br><br>> <span style="color:gray;">Signal processed successfully. Awaiting next node...</span>';
                    statusText.innerText = "Status: Awaiting KCL node analysis...";
                    isTyping = false;
                }
            }
            
            // Short delay before the typing starts to simulate loading
            setTimeout(typeWriter, 1200); 
        }
    </script>
</body>
</html>
