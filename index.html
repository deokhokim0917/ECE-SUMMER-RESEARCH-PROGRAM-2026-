<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECE Summer Research Camp 2026 - Terminal</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --neon-gold: #ffba08;
            --bg-dark: #0a0a0f;
            --panel-bg: #11111a;
        }
        
        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        #dashboard { 
            width: 95%; 
            max-width: 1200px; 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 20px; 
            border: 1px solid #333; 
            padding: 20px; 
            border-radius: 10px; 
            background: var(--panel-bg); 
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.05); 
        }
        
        .panel { 
            border: 1px solid #222; 
            padding: 15px; 
            border-radius: 5px; 
            position: relative; 
            background: rgba(0, 0, 0, 0.3);
        }
        
        h2 { 
            text-align: center; 
            color: var(--neon-blue); 
            font-size: 1rem; 
            margin-top: 0;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            letter-spacing: 1px;
        }
        
        /* Left Panel: Input Nodes */
        .node-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-top: 20px;
        }
        
        .btn-node { 
            background: transparent; 
            border: 1px solid #444; 
            color: #aaa; 
            padding: 12px 5px; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-family: inherit; 
            font-size: 0.85rem;
            border-radius: 3px;
        }
        
        .btn-node:hover, .btn-node.active { 
            border-color: var(--neon-blue);
            color: var(--neon-blue); 
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); 
            font-weight: bold;
        }
        
        /* Center Panel: Main Display */
        .cpu-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }
        
        .cpu-chip { 
            width: 180px; 
            height: 180px; 
            border: 2px solid var(--neon-gold); 
            background: #14141f; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-radius: 6px; 
            box-shadow: 0 0 15px rgba(255, 186, 8, 0.15); 
            position: relative; 
            margin: 30px 0; 
        }
        
        .cpu-text { 
            color: var(--neon-gold); 
            font-weight: bold; 
            font-size: 0.9rem; 
            line-height: 1.6;
        }
        
        /* Right Panel: Terminal */
        #terminal { 
            background: #050507; 
            color: var(--neon-green); 
            padding: 15px; 
            border-radius: 5px; 
            height: 300px; 
            overflow-y: auto; 
            border: 1px solid #222; 
            font-size: 0.85rem;
            line-height: 1.5;
        }
        
        .blinking-cursor { 
            display: inline-block; 
            width: 8px; 
            height: 1.1em; 
            background-color: var(--neon-green); 
            animation: blink 1s step-end infinite; 
            vertical-align: bottom; 
            margin-left: 2px;
        }
        
        @keyframes blink { 50% { opacity: 0; } }

        @media (max-width: 900px) {
            #dashboard { grid-template-columns: 1fr; }
            .cpu-container { order: -1; }
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <!-- Left Panel: Input Nodes -->
        <div class="panel">
            <h2>[ STUDENT_MESSAGES ]</h2>
            <p style="font-size: 0.75rem; color: #666; text-align: center; margin-top: 15px;">SELECT A NAME TO READ</p>
            <div class="node-grid" id="student-nodes">
                <!-- Buttons injected by JS -->
            </div>
        </div>

        <!-- Center Panel: Processor -->
        <div class="panel cpu-container">
            <h2>[ PROGRAM_INFO ]</h2>
            <div class="cpu-chip">
                <div class="cpu-text">Professor<br>Hanseop Kim<br><br><span style="color: white; font-size: 0.75rem; font-weight: normal; opacity: 0.8;">ECE SUMMER<br>RESEARCH CAMP<br>2026</span></div>
            </div>
            <p style="color: #666; font-size: 0.8rem;" id="status-text">System: Ready</p>
        </div>

        <!-- Right Panel: Terminal Output -->
        <div class="panel">
            <h2>[ TERMINAL_OUTPUT ]</h2>
            <div id="terminal">
                <span id="terminal-text">> System online.<br>> Select a student node to read their message...</span><span class="blinking-cursor"></span>
            </div>
        </div>
    </div>

    <script>
        // --- DATA SECTION: PASTE THE MESSAGES HERE ---
        const messages = {
            1: { name: "Student 1", text: "Paste Student 1's message here!" },
            2: { name: "Student 2", text: "Paste Student 2's message here!" },
            3: { name: "Deokho", text: "Thank you so much for creating this program so we could experience life at the main campus before eventually making our move to SLC. This camp has led me to think much more deeply about my future and showed me so many exciting paths I can take within the ECE department. Seeing all these opportunities firsthand has really fueled my ambitions, and I am incredibly grateful for the direction and inspiration this experience has given me." },
            4: { name: "Student 4", text: "Paste Student 4's message here!" },
            5: { name: "Student 5", text: "Paste Student 5's message here!" },
            6: { name: "Student 6", text: "Paste Student 6's message here!" },
            7: { name: "Student 7", text: "Paste Student 7's message here!" },
            8: { name: "Student 8", text: "Paste Student 8's message here!" },
            9: { name: "Student 9", text: "Paste Student 9's message here!" },
        };

        const nodeGrid = document.getElementById('student-nodes');
        const terminalText = document.getElementById('terminal-text');
        const statusText = document.getElementById('status-text');
        let isTyping = false;

        // Generate the 9 buttons
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn-node';
            btn.innerText = messages[i].name;
            btn.onclick = () => processSignal(i, btn);
            nodeGrid.appendChild(btn);
        }

        function processSignal(id, btn) {
            if (isTyping) return;
            isTyping = true;

            document.querySelectorAll('.btn-node').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            statusText.innerText = `System: Reading data from ${messages[id].name}...`;

            // Simplified execution headers
            const bootSequence = `> Connecting to node_${id}...<br>> Loading message from: <span style="color:white;">${messages[id].name}</span><br><br>`;
            
            terminalText.innerHTML = bootSequence;
            const actualMessage = messages[id].text;
            let i = 0;

            function typeWriter() {
                if (i < actualMessage.length) {
                    terminalText.innerHTML += actualMessage.charAt(i);
                    i++;
                    
                    const termDiv = document.getElementById('terminal');
                    termDiv.scrollTop = termDiv.scrollHeight;
                    
                    setTimeout(typeWriter, 20); 
                } else {
                    terminalText.innerHTML += '<br><br><span style="color:#555;">[End of Message]</span>';
                    statusText.innerText = "System: Ready";
                    isTyping = false;
                }
            }
            
            setTimeout(typeWriter, 500); 
        }
    </script>
</body>
</html>
