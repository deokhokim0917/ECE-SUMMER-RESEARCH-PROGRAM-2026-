<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECE Summer Research Camp 2026 - Terminal</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --neon-gold: #ffba08;
            --bg-dark: #0a0a0f;
            --panel-bg: #11111a;
        }
        
        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-size: 1.1rem; /* Increased base font size */
        }
        
        #dashboard { 
            width: 95%; 
            max-width: 1400px; /* Made the whole dashboard wider */
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 30px; /* Increased spacing between panels */
            border: 1px solid #333; 
            padding: 30px; /* Increased inner padding */
            border-radius: 10px; 
            background: var(--panel-bg); 
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.05); 
        }
        
        .panel { 
            border: 1px solid #222; 
            padding: 25px; /* Bigger padding inside panels */
            border-radius: 5px; 
            position: relative; 
            background: rgba(0, 0, 0, 0.3);
        }
        
        h2 { 
            text-align: center; 
            color: var(--neon-blue); 
            font-size: 1.2rem; /* Bigger headers */
            margin-top: 0;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            letter-spacing: 1px;
        }
        
        /* Left Panel: Input Nodes */
        .node-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; /* Bigger gaps between buttons */
            margin-top: 25px;
        }
        
        .btn-node { 
            background: transparent; 
            border: 1px solid #444; 
            color: #aaa; 
            padding: 15px 10px; /* Bigger buttons */
            cursor: pointer; 
            transition: all 0.2s; 
            font-family: inherit; 
            font-size: 1rem; /* Bigger button text */
            border-radius: 3px;
        }
        
        .btn-node:hover, .btn-node.active { 
            border-color: var(--neon-blue);
            color: var(--neon-blue); 
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); 
            font-weight: bold;
        }
        
        /* Center Panel: Main Display */
        .cpu-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            text-align: center; 
        }

        .logo-img {
            width: 80px; /* Size of the U of U Logo */
            margin-top: 10px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 5px rgba(204, 0, 0, 0.5));
        }
        
        .cpu-chip { 
            width: 220px; /* Bigger chip */
            height: 220px; /* Bigger chip */
            border: 2px solid var(--neon-gold); 
            background: #14141f; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-radius: 6px; 
            box-shadow: 0 0 15px rgba(255, 186, 8, 0.15); 
            position: relative; 
            margin: 10px 0 30px 0; 
        }
        
        .cpu-text { 
            color: var(--neon-gold); 
            font-weight: bold; 
            font-size: 1.1rem; /* Bigger chip text */
            line-height: 1.6;
        }
        
        /* Right Panel: Terminal */
        #terminal { 
            background: #050507; 
            color: var(--neon-green); 
            padding: 20px; 
            border-radius: 5px; 
            height: 380px; /* Taller terminal window */
            overflow-y: auto; 
            border: 1px solid #222; 
            font-size: 1rem; /* Bigger terminal text */
            line-height: 1.6;
        }
        
        .blinking-cursor { 
            display: inline-block; 
            width: 10px; 
            height: 1.1em; 
            background-color: var(--neon-green); 
            animation: blink 1s step-end infinite; 
            vertical-align: bottom; 
            margin-left: 3px;
        }
        
        @keyframes blink { 50% { opacity: 0; } }

        @media (max-width: 1100px) {
            #dashboard { grid-template-columns: 1fr; }
            .cpu-container { order: -1; }
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <!-- Left Panel: Input Nodes -->
        <div class="panel">
            <h2>[ STUDENT_MESSAGES ]</h2>
            <p style="font-size: 0.85rem; color: #666; text-align: center; margin-top: 15px;">SELECT A NAME TO READ</p>
            <div class="node-grid" id="student-nodes">
                <!-- Buttons injected by JS -->
            </div>
        </div>

        <!-- Center Panel: Processor -->
        <div class="panel cpu-container">
            <h2>[ ECE SUMMER RESEARCH PROGRAM 2026 ]</h2>
            <!-- Official U of U Logo from Wikimedia Commons -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Utah_Utes_logo.svg/512px-Utah_Utes_logo.svg.png" alt="University of Utah Logo" class="logo-img">
            <div class="cpu-chip">
                <div class="cpu-text">Professor<br>Hanseop Kim<br><br><span style="color: white; font-size: 0.9rem; font-weight: normal; opacity: 0.8;">ECE SUMMER<br>RESEARCH CAMP<br>2026</span></div>
            </div>
            <p style="color: #666; font-size: 0.9rem;" id="status-text">System: Ready</p>
        </div>

        <!-- Right Panel: Terminal Output -->
        <div class="panel">
            <h2>[ TERMINAL_OUTPUT ]</h2>
            <div id="terminal">
                <span id="terminal-text">> System online.<br>> Select a student node to read their message...</span><span class="blinking-cursor"></span>
            </div>
        </div>
    </div>

    <script>
        // --- DATA SECTION: PASTE THE MESSAGES HERE ---
        const messages = {
            1: { name: "Jongmin Lee", text: "Thank you so much for planning and organizing this incredible program for us! It was such an honor and privilege to visit the main campus and experience everything you put together. The tour of the Nanofab and the advanced research labs was truly amazing and deeply inspiring for all of us. Thank you for your vision, dedication, and for providing us with this invaluable opportunity to grow. We respect you so much!" },
            2: { name: "Sejin Lee", text: "Thank you for the ECE summer program you designed, exploring new labs and companies truly opened my mind. Going beyond the Asia Campus gave me so much to explore, and now my future research goals are clearer than before. I truly appreciate you giving me this great opportunity once more." },
            3: { name: "Deokho Kim", text: "Thank you so much for creating this program so we could experience life at the main campus before eventually making our move to SLC. This camp has led me to think much more deeply about my future and showed me so many exciting paths I can take within the ECE department. Seeing all these opportunities firsthand has really fueled my ambitions, and I am incredibly grateful for the direction and inspiration this experience has given me." },
            4: { name: "Jeongbin Lee", text: "Thank you for giving us the lab tours during the summer camp. Before the camp, I was not sure what major or job I wanted in the future. After the lab tours, I could think more about what I want to study. It was very helpful. If I have a chance like this again, I really want to join again. Thank you so much!" },
            5: { name: "Juram Lee", text: "Thank you for giving me the opportunity to participate in the ECE 2026 Summer Camp. I truly appreciate all the time and effort you put into organizing this program. It was a valuable experience, and I learned a lot throughout the camp. Thank you for your support and encouragement." },
            6: { name: "Junho Yun", text: "Thank you for offering us this opportunity. During the ECE summer camp I learned a lot and experienced so many things that I didn't know before. With such expereience I will make sure I contribute more to the ECE department! Thank you so much! I will see you soon!" },
            7: { name: "WOohyun Kang", text: "Thank you so much for organizing this amazing summer camp. I truly appreciate all the effort you have put into making this program possible. Meeting many professors and visiting their research labs was one of the most valuable parts of this experience. I also really appreciated how you helped us understand life in Utah and made us feel welcome. Thank you for giving us such a meaningful and unforgettable experience." },
            8: { name: "Eonjin Kim", text: "Thank you so much for your endless support and dedication during the Summer Camp! We were deeply moved by how you constantly made time to look after us, even with your incredibly busy schedule. It was so reassuring and empowering to have your strong guidance as our department chair, always encouraging us to take on new opportunities and grow. Thanks to your warm mentorship and care, I feel immense pride as an ECE student and have learned so much. I will continue to work hard to repay your kindness. Wishing you continuous health and happiness!" },
            9: { name: "Student 9", text: "Paste Student 9's message here!" },
        };

        const nodeGrid = document.getElementById('student-nodes');
        const terminalText = document.getElementById('terminal-text');
        const statusText = document.getElementById('status-text');
        let isTyping = false;

        // Generate the 9 buttons
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn-node';
            btn.innerText = messages[i].name;
            btn.onclick = () => processSignal(i, btn);
            nodeGrid.appendChild(btn);
        }

        function processSignal(id, btn) {
            if (isTyping) return;
            isTyping = true;

            document.querySelectorAll('.btn-node').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            statusText.innerText = `System: Reading data from ${messages[id].name}...`;

            const bootSequence = `> Connecting to node_${id}...<br>> Loading message from: <span style="color:white;">${messages[id].name}</span><br><br>`;
            
            terminalText.innerHTML = bootSequence;
            const actualMessage = messages[id].text;
            let i = 0;

            function typeWriter() {
                if (i < actualMessage.length) {
                    terminalText.innerHTML += actualMessage.charAt(i);
                    i++;
                    
                    const termDiv = document.getElementById('terminal');
                    termDiv.scrollTop = termDiv.scrollHeight;
                    
                    setTimeout(typeWriter, 20); 
                } else {
                    terminalText.innerHTML += '<br><br><span style="color:#555;">[End of Message]</span>';
                    statusText.innerText = "System: Ready";
                    isTyping = false;
                }
            }
            
            setTimeout(typeWriter, 500); 
        }
    </script>
</body>
</html>
